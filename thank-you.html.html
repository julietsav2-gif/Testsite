<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

  <h1>GTM & Server GTM Test Site</h1>

  <!-- CTA Click Section -->
  <div class="section">
    <h2>CTA Click Test</h2>
    <button id="ctaButton">Click Me</button>
  </div>

  <!-- Scroll Section -->
  <div class="section" style="height: 800px; background: #f4f4f4;">
    <h2>Scroll Test</h2>
    <p>Scroll down to trigger scroll tracking.</p>
  </div>

  <!-- Form Section -->
  <div class="section">
    <h2>Lead Form</h2>
    <form id="leadForm">
      <input type="text" id="name" placeholder="Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <button type="submit">Submit</button>
    </form>
  </div>

  <!-- Purchase Simulation -->
  <div class="section">
    <h2>Purchase Event</h2>
    <button id="purchaseBtn">Simulate Purchase</button>
  </div>

  <script>
    window.dataLayer = window.dataLayer || [];

    // CTA Click
    document.getElementById('ctaButton').addEventListener('click', function() {
      dataLayer.push({
        event: 'cta_click',
        button_id: 'ctaButton',
        page: 'homepage'
      });
    });

    // Form Submit
    document.getElementById('leadForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;

      dataLayer.push({
        event: 'form_submit',
        form_id: 'leadForm',
        user_email: email
      });

      window.location.href = '/thank-you.html';
    });

    // Purchase Event
    document.getElementById('purchaseBtn').addEventListener('click', function() {
      dataLayer.push({
        event: 'purchase',
        value: 99.99,
        currency: 'USD',
        transaction_id: 'txn_' + Date.now()
      });
    });

    // Scroll Tracking
    window.addEventListener('scroll', function() {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
        dataLayer.push({
          event: 'scroll_complete'
        });
      }
    });

  </script>

</body>
</html>

    dataLayer.push({
      event: 'thank_you_page_view'
    });
